# /eval Evaluation Query Set (Sample)
#
# These are SAMPLE queries to get started. Replace them with queries
# relevant to YOUR vault's knowledge base.
#
# Query text only. Ground truth notes are not specified
# (Deep Path dynamically generates the ground truth).
#
# type: factual (fact retrieval), synthesis (multi-note integration),
#       entity (person/org-driven), exploratory (open-ended)
# id: Used for partial re-runs (/eval --queries Q2,Q16,Q18)

# --- Entity-driven ---
- id: Q1
  query: "What are Alex Chen's technical concerns?"
  type: entity
  scope: narrow

- id: Q2
  query: "What is the current status of our relationship with Sunrise Hotel?"
  type: entity
  scope: medium

- id: Q3
  query: "What competitors does Acme SaaS have?"
  type: entity
  scope: medium

# --- Project-driven ---
- id: Q4
